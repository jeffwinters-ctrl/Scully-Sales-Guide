<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abstrakt SalesDeck Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-main:#0A0A0A;--bg-panel:#111111;--bg-card:#1A1A1A;--bg-hover:#222222;
  --red:#E63946;--red-hover:#FF4D5A;--red-muted:rgba(230,57,70,0.15);
  --text:#FFFFFF;--text-sec:#999999;--text-muted:#666666;
  --border:#2A2A2A;--amber:#FFA726;--green:#4CAF50;
}
html,body{height:100%;overflow:hidden;font-family:'Inter','Segoe UI',-apple-system,sans-serif;background:var(--bg-main);color:var(--text)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1A1A1A}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:var(--bg-main);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .3s}
#pin-screen.hidden{opacity:0;pointer-events:none}
.pin-card{background:var(--bg-card);border-radius:12px;padding:48px;max-width:400px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.5);text-align:center}
.pin-card h1{font-size:24px;font-weight:700;margin-bottom:4px}
.pin-card .brand{color:var(--red);font-size:28px;font-weight:800;margin-bottom:16px;display:block}
.pin-card p{color:var(--text-sec);font-size:15px;margin-bottom:24px}
.pin-input{width:100%;padding:14px;font-size:24px;text-align:center;letter-spacing:8px;background:var(--bg-main);border:2px solid var(--border);border-radius:8px;color:var(--text);outline:none;font-family:inherit;transition:border-color .2s}
.pin-input:focus{border-color:var(--red)}
.pin-input.error{border-color:var(--red);animation:shake .4s}
.pin-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;transition:background .2s;font-family:inherit}
.pin-btn:hover{background:var(--red-hover)}
.pin-error{color:var(--red);font-size:13px;margin-top:12px;min-height:20px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

/* APP LAYOUT */
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}

/* TOP BAR */
.top-bar{height:48px;background:var(--bg-panel);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.top-bar .logo{font-size:15px;font-weight:700;color:var(--text)}
.top-bar .logo span{color:var(--red)}
.top-bar .center{display:flex;align-items:center;gap:16px}
.top-bar .slide-indicator{font-size:13px;color:var(--text-sec)}
.timer{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.timer.warning{color:var(--amber)}
.timer.overtime{color:var(--red)}
.progress-wrap{width:120px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--red);transition:width .3s;border-radius:2px}
.top-bar .right{display:flex;align-items:center;gap:12px}
.lock-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:inherit;transition:color .2s}
.lock-btn:hover{color:var(--red)}

/* MAIN CONTENT */
.main{display:flex;flex:1;overflow:hidden}

/* LEFT PANEL */
.left-panel{width:220px;background:var(--bg-panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px}
.slide-thumb{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:4px;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:10px}
.slide-thumb:hover{background:var(--bg-hover)}
.slide-thumb.active{background:var(--red-muted);border-left-color:var(--red)}
.slide-thumb .num{font-size:13px;font-weight:700;color:var(--text-muted);min-width:20px}
.slide-thumb.active .num{color:var(--red)}
.slide-thumb .title{font-size:12px;font-weight:500;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slide-thumb.active .title{color:var(--text)}

/* CENTER PANEL */
.center-panel{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:32px 24px;position:relative}
.slide-card{max-width:800px;width:100%;background:var(--bg-card);border-radius:12px;padding:40px;box-shadow:0 2px 12px rgba(0,0,0,.3);animation:fadeIn .2s}
.slide-card h2{font-size:24px;font-weight:700;padding-bottom:14px;border-bottom:2px solid var(--red);margin-bottom:20px}
.slide-card ul{padding-left:20px;line-height:1.8}
.slide-card li{margin-bottom:6px;font-size:15px;color:#ccc}
.slide-card p{font-size:15px;line-height:1.7;color:#ccc;margin-bottom:12px}
.slide-card strong{color:var(--text)}
.slide-card table{width:100%;border-collapse:collapse}
.watermark{position:absolute;bottom:12px;right:16px;font-size:10px;color:#333}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* RIGHT PANEL */
.right-panel{width:380px;background:var(--bg-panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;letter-spacing:.5px;cursor:pointer;background:none;border:none;color:var(--text-muted);border-bottom:3px solid transparent;transition:all .2s;font-family:inherit}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--red)}
.tab-content{flex:1;overflow-y:auto;padding:16px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* WORD TRACK */
.wt-copy-btn{float:right;background:var(--bg-card);border:1px solid var(--border);color:var(--text-sec);border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.wt-copy-btn:hover{border-color:var(--red);color:var(--text)}
.wt-body{font-size:15px;line-height:1.75;color:#ddd}
.wt-body p{margin-bottom:14px}
.wt-body .highlight{background:rgba(230,57,70,0.2);color:var(--text);padding:1px 4px;border-radius:3px;font-weight:600}
.wt-body .placeholder{background:rgba(230,57,70,0.3);color:var(--red);padding:2px 6px;border-radius:3px;font-weight:700}
.wt-body .stage-dir{background:rgba(255,167,38,0.1);border-left:4px solid var(--amber);padding:8px 12px;margin:12px 0;border-radius:0 6px 6px 0;font-style:italic;color:var(--amber);font-size:14px}
.wt-body .ask-prospect{color:var(--red);font-style:italic;font-size:14px;margin:10px 0}
.wt-transition{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);font-style:italic;color:var(--text-sec);font-size:14px}

/* OBJECTIONS */
.objection-item{margin-bottom:8px;border-radius:6px;overflow:hidden;background:var(--bg-card)}
.objection-header{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .2s}
.objection-header:hover{background:var(--bg-hover)}
.objection-header .q{font-size:14px;font-weight:600;color:var(--red);flex:1}
.objection-header .chevron{color:var(--text-muted);font-size:12px;transition:transform .2s}
.objection-item.open .chevron{transform:rotate(180deg)}
.objection-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.objection-item.open .objection-body{max-height:600px}
.objection-body-inner{padding:0 14px 14px}
.resp-step{margin-bottom:10px}
.resp-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;display:block}
.resp-label.ack{color:var(--text-sec)}
.resp-label.ref{color:var(--amber)}
.resp-label.red{color:#64B5F6}
.resp-label.cls{color:var(--red)}
.resp-text{font-size:14px;line-height:1.6;color:#bbb}

/* BOTTOM BAR */
.bottom-bar{height:48px;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.nav-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.nav-btn:hover{border-color:var(--red);background:var(--red-muted)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn:disabled:hover{border-color:var(--border);background:var(--bg-card)}
.slide-dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.dot.active{background:var(--red);transform:scale(1.3)}
.dot:hover{background:var(--text-muted)}

/* SHORTCUTS OVERLAY */
#shortcuts-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:900}
#shortcuts-overlay.visible{display:flex}
.shortcuts-card{background:var(--bg-card);border-radius:12px;padding:32px;max-width:400px;width:90%}
.shortcuts-card h3{font-size:18px;margin-bottom:16px;color:var(--text)}
.sc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.sc-key{background:var(--bg-main);padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600;color:var(--red)}
.sc-desc{color:var(--text-sec)}
.sc-close{margin-top:16px;text-align:center}
.sc-close button{background:var(--red);color:#fff;border:none;padding:8px 24px;border-radius:6px;cursor:pointer;font-family:inherit}

/* MOBILE SCRIPT BUTTON */
.mobile-script-btn{display:none;position:fixed;bottom:64px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(230,57,70,.4);z-index:50}

/* MOBILE MODAL */
#mobile-modal{display:none;position:fixed;inset:0;background:var(--bg-main);z-index:800;flex-direction:column}
#mobile-modal.visible{display:flex}
.modal-header{height:48px;background:var(--bg-panel);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border)}
.modal-close{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer}
.modal-body{flex:1;overflow-y:auto}

/* RESPONSIVE */
@media(max-width:1023px){
  .left-panel{display:none}
  .right-panel{display:none}
  .mobile-script-btn{display:block}
}
@media(max-width:767px){
  .left-panel{display:none}
  .right-panel{display:none}
  .mobile-script-btn{display:block}
  .slide-card{padding:24px 16px}
  .center-panel{padding:16px 8px}
  .top-bar .logo{font-size:13px}
  .slide-dots{display:none}
}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-card">
    <span class="brand">Abstrakt</span>
    <h1>SalesDeck Coach</h1>
    <p>Enter your access code to continue</p>
    <input type="password" class="pin-input" id="pin-input" maxlength="10" autocomplete="off" autofocus>
    <button class="pin-btn" id="pin-btn">Enter</button>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo"><span>Abstrakt</span> SalesDeck Coach</div>
    <div class="center">
      <span class="slide-indicator" id="slide-indicator">Slide 1 of 18</span>
      <span class="timer" id="timer">00:00</span>
      <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="right">
      <button class="lock-btn" id="shortcuts-btn" title="Keyboard shortcuts (?)">?</button>
      <button class="lock-btn" id="lock-btn" title="Lock">Lock</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- LEFT PANEL -->
    <div class="left-panel" id="left-panel"></div>

    <!-- CENTER PANEL -->
    <div class="center-panel">
      <div class="slide-card" id="slide-card">
        <h2 id="slide-title"></h2>
        <div id="slide-body"></div>
      </div>
      <div class="watermark">Abstrakt SalesDeck Coach</div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="wordtrack">WORD TRACK</button>
        <button class="tab-btn" data-tab="objections">OBJECTIONS</button>
      </div>
      <div class="tab-content">
        <div class="tab-pane active" id="tab-wordtrack">
          <button class="wt-copy-btn" id="copy-btn">Copy</button>
          <div class="wt-body" id="wt-body"></div>
          <div class="wt-transition" id="wt-transition"></div>
        </div>
        <div class="tab-pane" id="tab-objections">
          <div id="objections-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="nav-btn" id="prev-btn">&larr; Previous</button>
    <div class="slide-dots" id="slide-dots"></div>
    <button class="nav-btn" id="next-btn">Next &rarr;</button>
  </div>

  <!-- MOBILE SCRIPT BUTTON -->
  <button class="mobile-script-btn" id="mobile-script-btn">&#9776;</button>
</div>

<!-- MOBILE MODAL -->
<div id="mobile-modal">
  <div class="modal-header">
    <div class="tab-bar" style="border:none;flex:1">
      <button class="tab-btn active" data-tab="m-wordtrack">WORD TRACK</button>
      <button class="tab-btn" data-tab="m-objections">OBJECTIONS</button>
    </div>
    <button class="modal-close" id="modal-close">&times;</button>
  </div>
  <div class="modal-body">
    <div class="tab-pane active" id="tab-m-wordtrack" style="padding:16px"></div>
    <div class="tab-pane" id="tab-m-objections" style="padding:16px"></div>
  </div>
</div>

<!-- SHORTCUTS OVERLAY -->
<div id="shortcuts-overlay">
  <div class="shortcuts-card">
    <h3>Keyboard Shortcuts</h3>
    <div class="sc-row"><span class="sc-key">&rarr; / &darr;</span><span class="sc-desc">Next slide</span></div>
    <div class="sc-row"><span class="sc-key">&larr; / &uarr;</span><span class="sc-desc">Previous slide</span></div>
    <div class="sc-row"><span class="sc-key">1-9, 0</span><span class="sc-desc">Jump to slide</span></div>
    <div class="sc-row"><span class="sc-key">T</span><span class="sc-desc">Word Track tab</span></div>
    <div class="sc-row"><span class="sc-key">O</span><span class="sc-desc">Objections tab</span></div>
    <div class="sc-row"><span class="sc-key">?</span><span class="sc-desc">Toggle shortcuts</span></div>
    <div class="sc-row"><span class="sc-key">Esc</span><span class="sc-desc">Close overlay</span></div>
    <div class="sc-close"><button onclick="toggleShortcuts()">Close</button></div>
  </div>
</div>

<script>
let slides = [];
let currentSlide = 0;
let timerInterval = null;
let timerSeconds = 0;

// PIN AUTH
const pinScreen = document.getElementById('pin-screen');
const pinInput = document.getElementById('pin-input');
const pinBtn = document.getElementById('pin-btn');
const pinError = document.getElementById('pin-error');
const app = document.getElementById('app');

if (sessionStorage.getItem('authed') === 'true') {
  pinScreen.classList.add('hidden');
  app.classList.add('visible');
  loadSlides();
}

pinBtn.addEventListener('click', doAuth);
pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });

async function doAuth() {
  const pin = pinInput.value.trim();
  if (!pin) return;
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin })
    });
    const data = await res.json();
    if (data.success) {
      sessionStorage.setItem('authed', 'true');
      pinScreen.classList.add('hidden');
      app.classList.add('visible');
      loadSlides();
    } else {
      pinInput.classList.add('error');
      pinError.textContent = 'Invalid access code';
      setTimeout(() => pinInput.classList.remove('error'), 400);
    }
  } catch {
    pinError.textContent = 'Connection error';
  }
}

// LOAD SLIDES
async function loadSlides() {
  try {
    const res = await fetch('/api/slides');
    const data = await res.json();
    slides = data.slides;
    buildNav();
    buildDots();
    goToSlide(0);
    startTimer();
  } catch (e) {
    console.error('Failed to load slides', e);
  }
}

// BUILD NAV
function buildNav() {
  const panel = document.getElementById('left-panel');
  panel.innerHTML = '';
  slides.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide-thumb' + (i === 0 ? ' active' : '');
    d.innerHTML = `<span class="num">${s.id}</span><span class="title">${esc(s.title)}</span>`;
    d.addEventListener('click', () => goToSlide(i));
    panel.appendChild(d);
  });
}

function buildDots() {
  const wrap = document.getElementById('slide-dots');
  wrap.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goToSlide(i));
    wrap.appendChild(d);
  });
}

// GO TO SLIDE
function goToSlide(idx) {
  if (idx < 0 || idx >= slides.length) return;
  currentSlide = idx;
  const s = slides[idx];

  // Update nav
  document.querySelectorAll('.slide-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));

  // Auto-scroll nav
  const thumbs = document.querySelectorAll('.slide-thumb');
  if (thumbs[idx]) thumbs[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Slide content
  const card = document.getElementById('slide-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
  document.getElementById('slide-title').textContent = s.title;
  document.getElementById('slide-body').innerHTML = s.content.body;

  // Indicator & progress
  document.getElementById('slide-indicator').textContent = `Slide ${idx + 1} of ${slides.length}`;
  document.getElementById('progress-fill').style.width = ((idx + 1) / slides.length * 100) + '%';

  // Word track
  document.getElementById('wt-body').innerHTML = formatWordTrack(s.wordTrack.script);
  const trans = document.getElementById('wt-transition');
  trans.textContent = s.wordTrack.transitionLine || '';
  trans.style.display = s.wordTrack.transitionLine ? 'block' : 'none';

  // Objections
  renderObjections(s.objections);

  // Mobile panels
  document.getElementById('tab-m-wordtrack').innerHTML =
    '<div class="wt-body">' + formatWordTrack(s.wordTrack.script) + '</div>' +
    (s.wordTrack.transitionLine ? '<div class="wt-transition">' + esc(s.wordTrack.transitionLine) + '</div>' : '');
  renderMobileObjections(s.objections);

  // Nav buttons
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === slides.length - 1;
}

// FORMAT WORD TRACK
function formatWordTrack(raw) {
  let text = raw;
  // Stage directions [[...]]
  text = text.replace(/\[\[([^\]]+)\]\]/g, '<div class="stage-dir">$1</div>');
  // Bold **...**
  text = text.replace(/\*\*\[([^\]]+)\]\*\*/g, '<span class="placeholder">[$1]</span>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<span class="highlight">$1</span>');
  // Standalone placeholders [...]
  text = text.replace(/\[([A-Z][^\]]*)\]/g, '<span class="placeholder">[$1]</span>');
  // Italic *...*
  text = text.replace(/\*([^*]+)\*/g, '<span class="ask-prospect">$1</span>');
  // Bullets
  text = text.replace(/^• (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gs, m => '<ul style="padding-left:20px;margin:8px 0">' + m + '</ul>');
  // Numbered lists
  text = text.replace(/^(\d+)\. (.+)$/gm, '<div style="margin-left:16px;margin-bottom:4px"><span class="highlight" style="margin-right:6px">$1.</span>$2</div>');
  // Paragraphs
  text = text.split('\n\n').map(p => {
    if (p.startsWith('<div') || p.startsWith('<ul') || p.startsWith('<span') || p.startsWith('<li')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  return text;
}

// RENDER OBJECTIONS
function renderObjections(objs) {
  const list = document.getElementById('objections-list');
  list.innerHTML = '';
  if (!objs || !objs.length) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:14px;padding:8px">No objections for this slide.</p>';
    return;
  }
  objs.forEach((o, i) => {
    const item = document.createElement('div');
    item.className = 'objection-item';
    item.innerHTML = `
      <div class="objection-header">
        <span class="q">"${esc(o.objection)}"</span>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="objection-body">
        <div class="objection-body-inner">
          <div class="resp-step"><span class="resp-label ack">Acknowledge</span><div class="resp-text">${esc(o.response.acknowledge)}</div></div>
          <div class="resp-step"><span class="resp-label ref">Reframe</span><div class="resp-text">${esc(o.response.reframe)}</div></div>
          <div class="resp-step"><span class="resp-label red">Redirect</span><div class="resp-text">${esc(o.response.redirect)}</div></div>
          <div class="resp-step"><span class="resp-label cls">Close</span><div class="resp-text">${esc(o.response.close)}</div></div>
        </div>
      </div>`;
    item.querySelector('.objection-header').addEventListener('click', () => {
      const wasOpen = item.classList.contains('open');
      list.querySelectorAll('.objection-item').forEach(x => x.classList.remove('open'));
      if (!wasOpen) item.classList.add('open');
    });
    list.appendChild(item);
  });
}

function renderMobileObjections(objs) {
  const list = document.getElementById('tab-m-objections');
  list.innerHTML = '';
  if (!objs || !objs.length) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:14px">No objections for this slide.</p>';
    return;
  }
  objs.forEach(o => {
    const item = document.createElement('div');
    item.className = 'objection-item';
    item.style.marginBottom = '8px';
    item.innerHTML = `
      <div class="objection-header"><span class="q">"${esc(o.objection)}"</span><span class="chevron">&#9660;</span></div>
      <div class="objection-body"><div class="objection-body-inner">
        <div class="resp-step"><span class="resp-label ack">Acknowledge</span><div class="resp-text">${esc(o.response.acknowledge)}</div></div>
        <div class="resp-step"><span class="resp-label ref">Reframe</span><div class="resp-text">${esc(o.response.reframe)}</div></div>
        <div class="resp-step"><span class="resp-label red">Redirect</span><div class="resp-text">${esc(o.response.redirect)}</div></div>
        <div class="resp-step"><span class="resp-label cls">Close</span><div class="resp-text">${esc(o.response.close)}</div></div>
      </div></div>`;
    item.querySelector('.objection-header').addEventListener('click', () => {
      const wasOpen = item.classList.contains('open');
      list.querySelectorAll('.objection-item').forEach(x => x.classList.remove('open'));
      if (!wasOpen) item.classList.add('open');
    });
    list.appendChild(item);
  });
}

// TABS
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    const parent = btn.closest('.tab-bar') || btn.parentElement;
    parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const container = btn.closest('.right-panel') || btn.closest('#mobile-modal');
    if (container) {
      container.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      const pane = container.querySelector('#tab-' + tab);
      if (pane) pane.classList.add('active');
    }
  });
});

// COPY
document.getElementById('copy-btn').addEventListener('click', () => {
  const text = slides[currentSlide].wordTrack.script
    .replace(/\*\*/g, '').replace(/\[\[([^\]]+)\]\]/g, '[$1]');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
});

// NAV BUTTONS
document.getElementById('prev-btn').addEventListener('click', () => goToSlide(currentSlide - 1));
document.getElementById('next-btn').addEventListener('click', () => goToSlide(currentSlide + 1));

// LOCK
document.getElementById('lock-btn').addEventListener('click', () => {
  sessionStorage.removeItem('authed');
  location.reload();
});

// MOBILE MODAL
document.getElementById('mobile-script-btn').addEventListener('click', () => {
  document.getElementById('mobile-modal').classList.add('visible');
});
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('mobile-modal').classList.remove('visible');
});

// SHORTCUTS
function toggleShortcuts() {
  document.getElementById('shortcuts-overlay').classList.toggle('visible');
}
document.getElementById('shortcuts-btn').addEventListener('click', toggleShortcuts);

// KEYBOARD
document.addEventListener('keydown', e => {
  if (document.getElementById('pin-screen').classList.contains('hidden') === false) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  switch (e.key) {
    case 'ArrowRight': case 'ArrowDown': e.preventDefault(); goToSlide(currentSlide + 1); break;
    case 'ArrowLeft': case 'ArrowUp': e.preventDefault(); goToSlide(currentSlide - 1); break;
    case 't': case 'T': document.querySelector('.right-panel .tab-btn[data-tab="wordtrack"]').click(); break;
    case 'o': case 'O': document.querySelector('.right-panel .tab-btn[data-tab="objections"]').click(); break;
    case '?': toggleShortcuts(); break;
    case 'Escape':
      document.getElementById('shortcuts-overlay').classList.remove('visible');
      document.getElementById('mobile-modal').classList.remove('visible');
      break;
    default:
      if (e.key >= '1' && e.key <= '9') goToSlide(parseInt(e.key) - 1);
      if (e.key === '0') goToSlide(9);
  }
});

// TOUCH SWIPE
let touchStartX = 0;
document.querySelector('.center-panel')?.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
});
document.querySelector('.center-panel')?.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) {
    if (diff < 0) goToSlide(currentSlide + 1);
    else goToSlide(currentSlide - 1);
  }
});

// TIMER
function startTimer() {
  timerSeconds = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
    const s = String(timerSeconds % 60).padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = m + ':' + s;
    el.className = 'timer';
    if (timerSeconds >= 19 * 60) el.classList.add('overtime');
    else if (timerSeconds >= 15 * 60) el.classList.add('warning');
  }, 1000);
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
